---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Shattered Blade | {{ site.title }}</title>
  <script>window.NOVEL_FORCE_DESKTOP = true;</script>
  <script>window.NOVEL_BACKGROUNDS = [{% for file in site.static_files %}{% if file.path contains '/assets/backgrounds/' %}{"name":"{{ file.basename }}","url":"{{ file.path | relative_url }}"},{% endif %}{% endfor %}];</script>
  <link rel="stylesheet" href="{{ '/assets/css/novel-reader.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Comment Modal -->
  <div id="comment-modal" class="modal">
    <div class="modal-content comment-modal-content">
      <div class="modal-header">
        <h3 id="comment-modal-title">Add Comment</h3>
        <button class="modal-close" id="close-comment-modal">&times;</button>
      </div>
      <div id="comment-context" class="comment-context"></div>
      <button id="btn-remove-highlight" class="comment-remove-hl" style="display:none">Remove Highlight</button>
      <form id="comment-form">
        <input type="hidden" id="comment-level">
        <input type="hidden" id="comment-chapter">
        <input type="hidden" id="comment-page">
        <input type="hidden" id="comment-para">
        <input type="hidden" id="comment-highlight-id">
        <textarea id="comment-text" placeholder="Write your comment..." rows="4" required></textarea>
        <button type="submit" class="btn btn-primary">Submit Comment</button>
      </form>
      <div id="existing-comments" class="existing-comments"></div>
    </div>
  </div>


  <!-- Highlight Toolbar (appears on text selection) -->
  <div id="highlight-toolbar" class="highlight-toolbar">
    <button id="hl-btn-highlight" title="Highlight"><span class="hl-icon">&#9998;</span> Highlight</button>
    <button id="hl-btn-comment" title="Comment"><span class="hl-icon">&#128172;</span> Comment</button>
  </div>

  <!-- Top Bar -->
  <header class="reader-header">
    <div class="header-left">
      <a href="{{ '/' | relative_url }}" class="back-link">&larr; Back</a>
      <span class="header-title">The Shattered Blade</span>
    </div>
<div class="header-right">
      <div class="text-size-controls">
        <button class="toolbar-btn text-size-btn text-size-sm" id="btn-size-down" title="Decrease text size">A</button>
        <button class="toolbar-btn text-size-btn text-size-lg" id="btn-size-up" title="Increase text size">A</button>
      </div>
      <button class="toolbar-btn" id="btn-toc" title="Table of Contents">Index</button>
      <button class="toolbar-btn" id="btn-comments" title="View Comments">Comments</button>
      <div class="diff-picker-wrapper">
        <button class="toolbar-btn" id="btn-diff" title="Version Diff">Diff</button>
        <div id="diff-picker" class="diff-picker"></div>
      </div>
      <div class="bg-picker-wrapper">
        <button class="toolbar-btn" id="btn-bg" title="Background">Scene</button>
        <div id="bg-picker" class="bg-picker"></div>
      </div>
    </div>
  </header>

  <!-- Reader -->
  <main class="reader-main">
    <button class="nav-arrow nav-arrow-left" id="nav-prev" title="Previous page">&lsaquo;</button>

    <div id="book-frame">
      <div id="stack-left" class="page-stack"></div>

      <div class="book-container book-is-closed">
        <div class="page page-left" id="page-left">
          <div class="page-header"><span class="page-chapter"></span></div>
          <div class="page-content"></div>
          <div class="page-footer"><span class="page-num"></span></div>
        </div>
        <div class="page-spine"></div>
        <div class="page page-right" id="page-right">
          <div class="page-header"><span class="page-chapter"></span></div>
          <div class="page-content"></div>
          <div class="page-footer"><span class="page-num"></span></div>
        </div>

        <!-- Hardcover front cover — covers right page, flips open to the left -->
        <div id="book-cover">
          <div class="cover-decoration cover-decoration-top"></div>
          <h2 class="cover-title">The Shattered Blade</h2>
          <div class="cover-decoration cover-decoration-mid"></div>
          <p class="cover-author">Sanjeev Venkatesan</p>
        </div>
      </div>

      <div id="stack-right" class="page-stack"></div>
    </div>

    <button class="nav-arrow nav-arrow-right" id="nav-next" title="Next page">&rsaquo;</button>
  </main>

  <!-- Mobile bottom chrome (hidden by default, slides up on tap) -->
  <div id="mobile-bottom-chrome" class="mobile-bottom-chrome">
    <div class="mobile-progress-row">
      <input type="range" id="mobile-progress-slider"
             class="mobile-progress-slider"
             min="0" max="100" value="0" step="1">
    </div>
    <div class="mobile-page-indicator" id="mobile-page-indicator">Page 1 of 1</div>
  </div>

  <!-- Page indicator + progress bar -->
  <footer class="reader-footer">
    <span id="page-indicator"></span>
  </footer>
  <div class="progress-bar-track"><div id="progress-bar" class="progress-bar-fill"></div></div>

  <!-- TOC Sidebar -->
  <aside id="toc-sidebar" class="toc-sidebar">
    <div class="sidebar-header">
      <h3>Index</h3>
      <button class="modal-close" id="close-toc-sidebar">&times;</button>
    </div>
    <div id="toc-list" class="toc-list"></div>
  </aside>

  <!-- Comments Sidebar -->
  <aside id="comments-sidebar" class="comments-sidebar">
    <div class="sidebar-header">
      <h3>Comments</h3>
      <button class="modal-close" id="close-comments-sidebar">&times;</button>
    </div>
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-scope="page">Page</button>
      <button class="sidebar-tab" data-scope="chapter">Chapter</button>
      <button class="sidebar-tab" data-scope="novel">Novel</button>
    </div>
    <div id="sidebar-comments-list" class="sidebar-comments-list"></div>
    <button class="btn btn-primary sidebar-add-comment" id="sidebar-add-comment">Add Comment</button>
  </aside>

  <script src="{{ '/assets/js/md-parser.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/novel-reader.js' | relative_url }}"></script>
</body>
</html>
